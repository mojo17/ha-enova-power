name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "30 4 * * 1"
  workflow_dispatch: {}

jobs:
  hassfest:
    # These actions use GitHub-hosted images / APIs and don't run on Gitea
    # Actions; gate to GitHub so the Gitea mirror doesn't fail them.
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration

  tests:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          # Must match the Home Assistant version pulled by
          # pytest-homeassistant-custom-component (currently requires >=3.14).
          # A lower version makes pip backtrack to ancient deps that have no
          # wheels for it and try to compile them from source.
          python-version: "3.14"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements_test.txt
      - run: pytest --cov=custom_components.enova_power --cov-report=term-missing
