name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "30 4 * * 1"
  workflow_dispatch: {}

jobs:
  hassfest:
    # These actions use GitHub-hosted images / APIs and don't run on Gitea
    # Actions; gate to GitHub so the Gitea mirror doesn't fail them.
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Temporary: drop once the home-assistant/brands PR for enova_power
          # is merged (brand assets are also required for core).
          ignore: brands

  tests:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    # Non-blocking for now: standing up the full HA test environment in CI is
    # fragile (HA/numpy pins can force source builds). Validate locally in a HA
    # dev container and pin pytest-homeassistant-custom-component to your target
    # HA version, then drop continue-on-error to make this gating again.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: pip install --prefer-binary -r requirements_test.txt
      - run: pytest --cov=custom_components.enova_power --cov-report=term-missing
